<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover"
    />
    <meta name="theme-color" content="#000000" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="PhonePad" />
    <title>PhonePad Controller</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app">
      <header class="top">
        <div class="connection-badges" aria-live="polite">
          <span
            id="server-connection"
            class="connection-badge connecting"
            role="status"
            aria-label="Server: connecting"
            title="Server: connecting"
          ></span>
          <span
            id="laptop-connection"
            class="connection-badge waiting"
            role="status"
            aria-label="Laptop: waiting"
            title="Laptop: waiting"
          ></span>
        </div>
        <p id="device-note" class="device-note" hidden></p>
        <div class="top-actions">
          <button id="take-control" class="retry-btn" type="button" hidden>Use this tab</button>
          <button id="fullscreen-toggle" class="retry-btn" type="button" hidden>Fullscreen</button>
          <button id="reconnect-now" class="retry-btn" type="button" hidden>Reconnect now</button>
        </div>
      </header>

      <section class="controller" id="controller">
        <div class="dpad" id="dpad"></div>
        <div class="actions" id="actions"></div>
      </section>

      <section class="extras" id="extras" hidden></section>
    </main>

    <script type="module" src="/controller.js"></script>
  </body>
</html>
