<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PhonePad Controller</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="layout">
      <h1>PhonePad</h1>
      <p id="status" class="status disconnected">disconnected</p>

      <section class="controller">
        <div class="dpad">
          <button id="btn-up" class="pad-btn">Up</button>
          <button id="btn-left" class="pad-btn">Left</button>
          <button id="btn-right" class="pad-btn">Right</button>
          <button id="btn-down" class="pad-btn">Down</button>
        </div>

        <div class="actions">
          <button id="btn-A" class="action-btn">A</button>
          <button id="btn-B" class="action-btn">B</button>
        </div>
      </section>
    </main>

    <script type="module" src="/controller.js"></script>
  </body>
</html>
