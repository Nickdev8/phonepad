services:
  phonepad:
    build: .
    container_name: phonepad
    init: true
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PHONEPAD_HOST: 0.0.0.0
      PHONEPAD_PORT: 3017
      PHONEPAD_PUBLIC_URL: ${PHONEPAD_PUBLIC_URL:-}
      PHONEPAD_ACCESS_TOKEN: ${PHONEPAD_ACCESS_TOKEN:-}
      PHONEPAD_PRESET: ${PHONEPAD_PRESET:-classic}
      PHONEPAD_JOYSTICK: ${PHONEPAD_JOYSTICK:-}
      PHONEPAD_BUTTONS: ${PHONEPAD_BUTTONS:-}
      PHONEPAD_INPUTS: ${PHONEPAD_INPUTS:-}
      PHONEPAD_HAPTICS: ${PHONEPAD_HAPTICS:-on}
    ports:
      - "3017:3017"
